<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Deal Finder — Ryan Spiteri</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; color: #1a1a1a; }
.header { background: #111; padding: 20px 28px; border-bottom: 3px solid #ff8c00; }
.header h1 { font-size: 20px; font-weight: 800; color: #ff8c00; }
.header p { color: #888; font-size: 11px; margin-top: 3px; }
.stats { display: flex; gap: 12px; padding: 16px 28px; background: #fff; border-bottom: 1px solid #e5e5e5; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
.stat { background: #f8f8f8; border-radius: 8px; padding: 12px 18px; min-width: 100px; border: 1px solid #e5e5e5; }
.stat-val { font-size: 24px; font-weight: 800; color: #111; }
.stat-label { font-size: 10px; color: #888; margin-top: 1px; text-transform: uppercase; letter-spacing: 0.5px; }
.stat.hot .stat-val { color: #e53e3e; }
.stat.warm .stat-val { color: #d97706; }
.stat.green .stat-val { color: #16a34a; }
.filters { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 14px 28px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; position: sticky; top: 72px; z-index: 99; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-group label { font-size: 10px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
select { border: 1px solid #ddd; border-radius: 6px; padding: 6px 10px; font-size: 12px; background: #fff; color: #1a1a1a; outline: none; cursor: pointer; }
select:focus { border-color: #ff8c00; }
.reset-btn { padding: 7px 16px; background: #f0f0f0; color: #555; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; cursor: pointer; height: 32px; }
.reset-btn:hover { background: #e5e5e5; }
.results-bar { padding: 10px 28px; background: #fff; border-bottom: 1px solid #e5e5e5; font-size: 12px; color: #666; position: sticky; top: 166px; z-index: 98; }
.results-bar strong { color: #111; }
.content { padding: 20px 28px; }
.table-wrap { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #e5e5e5; }
table { width: 100%; border-collapse: collapse; }
thead th { background: #111; color: #ff8c00; padding: 11px 14px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; white-space: nowrap; cursor: pointer; user-select: none; }
thead th:hover { background: #1a1a1a; }
thead th.sorted { color: #fff; }
tbody td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; font-size: 12px; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #fafafa; }
.badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; }
.badge.hot { background: #fee2e2; color: #dc2626; }
.badge.warm { background: #fef3c7; color: #d97706; }
.badge.new { background: #f0f0f0; color: #888; }
.draft-btn { padding: 4px 10px; background: #2563eb; color: #fff; border: none; border-radius: 5px; font-size: 11px; font-weight: 600; cursor: pointer; }
.draft-btn:hover { background: #1d4ed8; }
.no-results { padding: 60px; text-align: center; color: #aaa; font-size: 14px; }
/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.active { display: flex; }
.modal { background: #fff; border-radius: 14px; max-width: 640px; width: 100%; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.modal-header { padding: 20px 24px 16px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: flex-start; }
.modal-title { font-size: 14px; font-weight: 700; color: #111; }
.modal-sub { font-size: 11px; color: #888; margin-top: 3px; }
.modal-close { background: #f0f0f0; border: none; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.modal-close:hover { background: #e0e0e0; }
.modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
.modal-body pre { white-space: pre-wrap; font-family: -apple-system, sans-serif; font-size: 13px; line-height: 1.7; color: #333; }
.modal-footer { padding: 14px 24px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 8px; }
.btn-copy { padding: 8px 16px; background: #ff8c00; color: #fff; border: none; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-copy:hover { background: #e07800; }
.btn-cancel { padding: 8px 16px; background: #f0f0f0; color: #555; border: 1px solid #ddd; border-radius: 7px; font-size: 12px; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <h1>Property Deal Finder</h1>
  <p id="header-sub">Gold Coast | $600K–$1.5M | Loading...</p>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="stat-total">—</div><div class="stat-label">Showing</div></div>
  <div class="stat hot"><div class="stat-val" id="stat-hot">—</div><div class="stat-label">Hot (60+ days)</div></div>
  <div class="stat warm"><div class="stat-val" id="stat-warm">—</div><div class="stat-label">Warm (30-60d)</div></div>
  <div class="stat green"><div class="stat-val" id="stat-emails">—</div><div class="stat-label">Offer Drafts</div></div>
</div>

<div class="filters">
  <div class="filter-group">
    <label>Suburb</label>
    <select id="filter-suburb"><option value="">All Suburbs</option></select>
  </div>
  <div class="filter-group">
    <label>Bedrooms</label>
    <select id="filter-beds">
      <option value="">Any</option>
      <option value="1">1+</option>
      <option value="2">2+</option>
      <option value="3">3+</option>
      <option value="4">4+</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Days on Market</label>
    <select id="filter-days">
      <option value="">Any</option>
      <option value="30">30+ days</option>
      <option value="60">60+ days (motivated)</option>
      <option value="90">90+ days</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Max Price</label>
    <select id="filter-price">
      <option value="">Any</option>
      <option value="800000">Under $800K</option>
      <option value="1000000">Under $1M</option>
      <option value="1200000">Under $1.2M</option>
      <option value="1500000">Under $1.5M</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Type</label>
    <select id="filter-type">
      <option value="">Any</option>
      <option value="house">House</option>
      <option value="apartment">Apartment/Unit</option>
      <option value="townhouse">Townhouse</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Offer Draft</label>
    <select id="filter-email">
      <option value="">All</option>
      <option value="yes">Has Draft</option>
    </select>
  </div>
  <button class="reset-btn" onclick="resetFilters()">Reset</button>
</div>

<div class="results-bar"><strong id="result-count">0</strong> listings</div>

<div class="content">
<div class="table-wrap">
<table>
<thead>
<tr>
  <th onclick="sortBy('address',this)">Address</th>
  <th onclick="sortBy('suburb',this)">Suburb</th>
  <th onclick="sortBy('bedrooms',this)">Beds</th>
  <th onclick="sortBy('price',this)">Price</th>
  <th onclick="sortBy('days_on_market',this)">Days</th>
  <th onclick="sortBy('offer',this)">Offer (75%)</th>
  <th>Draft</th>
</tr>
</thead>
<tbody id="deals-body"></tbody>
</table>
<div class="no-results" id="no-results" style="display:none">No listings match your filters.</div>
</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title">Offer Draft</div>
        <div class="modal-sub" id="modal-sub"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <pre id="modal-content"></pre>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModalDirect()">Close</button>
      <button class="btn-copy" onclick="copyEmail()">Copy Email</button>
    </div>
  </div>
</div>

    suburb: document.getElementById('filter-suburb').value,
    beds: document.getElementById('filter-beds').value,
    days: document.getElementById('filter-days').value,
    price: document.getElementById('filter-price').value,
    type: document.getElementById('filter-type').value,
    email: document.getElementById('filter-email').value,
  };
}

function applyFilters() {
  const f = getFilters();
  let filtered = DEALS.filter(d => {
    if (f.suburb && d.suburb !== f.suburb) return false;
    if (f.beds) { const b = parseInt(d.bedrooms); if (isNaN(b) || b < parseInt(f.beds)) return false; }
    if (f.days && (d.days_on_market||0) < parseInt(f.days)) return false;
    if (f.price && d.price > 0 && d.price > parseInt(f.price)) return false;
    if (f.type) {
      const t = (d.property_type||'').toLowerCase();
      if (f.type==='house' && !t.includes('house')) return false;
      if (f.type==='apartment' && !t.includes('apartment') && !t.includes('unit') && !t.includes('flat')) return false;
      if (f.type==='townhouse' && !t.includes('townhouse')) return false;
    }
    if (f.email === 'yes' && !EMAIL_IDS.includes(d.id)) return false;
    return true;
  });

  if (sortCol) {
    filtered.sort((a, b) => {
      let va = sortCol === 'offer' ? (a.price||0)*0.75 : (a[sortCol]||0);
      let vb = sortCol === 'offer' ? (b.price||0)*0.75 : (b[sortCol]||0);
      if (typeof va === 'string') va = va.toLowerCase();
      if (typeof vb === 'string') vb = vb.toLowerCase();
      return va < vb ? -sortDir : va > vb ? sortDir : 0;
    });
  }

  renderTable(filtered);
  updateStats(filtered);
}

function sortBy(col, th) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted'));
  th.classList.add('sorted');
  applyFilters();
}

function renderTable(deals) {
  const tbody = document.getElementById('deals-body');
  document.getElementById('result-count').textContent = deals.length;
  document.getElementById('no-results').style.display = deals.length ? 'none' : 'block';
  if (!deals.length) { tbody.innerHTML = ''; return; }

  tbody.innerHTML = deals.map(d => {
    const days = d.days_on_market || 0;
    const price = d.price || 0;
    const offer = price > 0 ? Math.floor(price * 0.75) : 0;
    const offerStr = offer > 0 ? '$' + offer.toLocaleString() : 'POA';
    const hasDraft = EMAIL_IDS.includes(d.id);

    let dayBadge = days >= 60
      ? `<span class="badge hot">${days}d 🔥</span>`
      : days >= 30
        ? `<span class="badge warm">${days}d</span>`
        : `<span class="badge new">${days}d</span>`;

    const addrCell = d.url
      ? `<a href="${d.url}" target="_blank" style="color:#1a1a1a;text-decoration:none;font-weight:500">${d.address}</a>`
      : `<span style="font-weight:500">${d.address}</span>`;

    const draftBtn = hasDraft
      ? `<button class="draft-btn" onclick="openDraft('${d.id}','${d.address.replace(/'/g,"\'")}','${d.price_display||''}')">View Draft</button>`
      : `<span style="color:#ccc;font-size:11px">—</span>`;

    const beds = d.bedrooms && d.bedrooms !== '?' ? `${d.bedrooms}bd` : '—';

    return `<tr>
      <td>${addrCell}</td>
      <td style="color:#555;font-size:11px">${d.suburb||'—'}</td>
      <td style="text-align:center;font-size:11px">${beds}</td>
      <td style="font-weight:600">${d.price_display||'POA'}</td>
      <td style="text-align:center">${dayBadge}</td>
      <td style="font-weight:700;color:#16a34a">${offerStr}</td>
      <td>${draftBtn}</td>
    </tr>`;
  }).join('');
}

function updateStats(filtered) {
  const hot = filtered.filter(d => (d.days_on_market||0) >= 60).length;
  const warm = filtered.filter(d => (d.days_on_market||0) >= 30 && (d.days_on_market||0) < 60).length;
  const emails = filtered.filter(d => EMAIL_IDS.includes(d.id)).length;
  document.getElementById('stat-total').textContent = filtered.length;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-warm').textContent = warm;
  document.getElementById('stat-emails').textContent = emails;
  document.getElementById('header-sub').textContent = `Gold Coast | $600K–$1.5M | ${DEALS.length} total listings`;
}


function parseDraft(full) {
  const meta = [];
  let email = '', brief = '', section = 'meta';
  for (const line of full.split('\n')) {
    if (/SECTION 1/.test(line)) { section = 'email'; continue; }
    if (/SECTION 2/.test(line)) { section = 'brief'; continue; }
    if (/^---/.test(line)) continue;
    if (/^(PROPERTY|ASKING|OUR OFFER|DAYS ON MARKET|AGENT):/.test(line)) { meta.push(line); continue; }
    if (/^={3,}/.test(line)) continue;
    if (section === 'email') email += line + '\n';
    else if (section === 'brief') brief += line + '\n';
  }
  if (!email.trim()) email = full;
  return { meta, email: email.trim(), brief: brief.trim() };
}

function openDraft(id, address, price) {
  const full = DRAFTS[id] || 'Draft not found.';
  const { meta, email, brief } = parseDraft(full);
  
  document.getElementById('modal-title').textContent = 'Offer Draft';
  document.getElementById('modal-sub').textContent = address + (price ? ' — ' + price : '');
  
  const metaEl = document.getElementById('modal-meta');
  if (meta.length) {
    metaEl.innerHTML = meta.map(l => {
      const idx = l.indexOf(':');
      return '<strong>' + l.slice(0,idx) + ':</strong> ' + l.slice(idx+1).trim();
    }).join(' &nbsp;&middot;&nbsp; ');
    metaEl.style.display = 'block';
  } else { metaEl.style.display = 'none'; }
  
  const briefEl = document.getElementById('modal-brief');
  if (brief) {
    briefEl.innerHTML = '<div style="font-size:10px;font-weight:700;color:#b45309;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Elara\'s Brief</div>' +
      brief.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').split('\n').join('<br>');
    briefEl.style.display = 'block';
  } else { briefEl.style.display = 'none'; }
  
  document.getElementById('modal-content').textContent = email;
  document.getElementById('modal-overlay').classList.add('active');
}

function copyEmail() {
  const text = document.getElementById('modal-content').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

function resetFilters() {
  ['filter-suburb','filter-beds','filter-days','filter-price','filter-type','filter-email'].forEach(id => document.getElementById(id).value = '');
  sortCol = null; sortDir = 1;
  applyFilters();
}

['filter-suburb','filter-beds','filter-days','filter-price','filter-type','filter-email'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});

applyFilters();
</script>
</body>
