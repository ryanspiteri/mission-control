<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Property Deal Finder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d0d;color:#e2e8f0;padding:24px}
.header{background:#111;border:1px solid #222;border-radius:12px;padding:20px 24px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.title{font-size:20px;font-weight:800;color:#FF8C00}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:#111;border:1px solid #222;border-radius:10px;padding:14px 16px}
.stat-val{font-size:24px;font-weight:800;color:#fff}
.stat-label{font-size:11px;color:#64748b;margin-top:3px}
table{width:100%;border-collapse:collapse;background:#111;border:1px solid #222;border-radius:10px;overflow:hidden}
th{background:#161616;padding:10px 12px;text-align:left;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #222}
</style>
</head>
<body>
<div class="header">
    <div>
        <div class="title">Property Deal Finder</div>
        <div style="font-size:12px;color:#64748b;margin-top:3px">Gold Coast & Brisbane | 600K-1500K</div>
    </div>
    <div style="font-size:12px;color:#64748b">Updated: 02 April 2026, 01:31 AM AEST</div>
</div>
<div class="stats">
    <div class="stat"><div class="stat-val">111</div><div class="stat-label">Total listings scanned</div></div>
    <div class="stat"><div class="stat-val">0</div><div class="stat-label">Deals identified</div></div>
    <div class="stat"><div class="stat-val">0</div><div class="stat-label">Motivated sellers (60+ days)</div></div>
    <div class="stat"><div class="stat-val">0</div><div class="stat-label">High score deals</div></div>
</div>
<table>
<thead><tr>
    <th>Address</th><th>Price</th><th>Specs</th><th>Days</th><th>Type</th><th>Score</th><th>Flags</th>
</tr></thead>
<tbody></tbody>
</table>
<div style="margin-top:12px;font-size:11px;color:#374151;text-align:center">Click any row to view on Domain.com.au</div>
</body>
</html>
